name: Fetch quotes

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run fetcher
        env:
          ZOHO_URL: ${{ secrets.ZOHO_URL }}
          ZOHO_LIST_URL: ${{ secrets.ZOHO_LIST_URL }}
          TICKERS: ${{ secrets.TICKERS }}
        run: python fetch_quotes.py
